name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1) Uvek: lint + build (i na push i na PR)
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Postavi Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instaliraj zavisnosti
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
        env:
          VITE_API_URL: /api

  # 2) Samo na push na main I samo ako 'test' prođe: image -> Docker Hub -> Render
  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t ${{ secrets.DOCKER_USERNAME }}/cardatabase-frontend:latest .

      - name: Push Docker image to Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cardatabase-frontend:latest

      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
          -H "Accept: application/json" \
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
