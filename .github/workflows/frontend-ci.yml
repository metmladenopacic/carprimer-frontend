name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Postavi Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instaliraj zavisnosti
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (tsc + vite)
        run: npm run build
        env:
          VITE_API_URL: /api
